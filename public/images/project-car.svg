  <path d="M640 446 H1040" fill="none" stroke="#dbeafe" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <circle cx="744" cy="446" r="42" fill="#0b1320" stroke="#67e8f9" stroke-width="8"/>
  <circle cx="948" cy="446" r="42" fill="#0b1320" stroke="#67e8f9" stroke-width="8"/>
  <rect x="688" y="308" width="310" height="170" rx="28" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="724" y="340" width="120" height="56" rx="16" fill="rgba(56,189,248,0.18)"/>
  <rect x="860" y="340" width="98" height="56" rx="16" fill="rgba(94,234,212,0.18)"/>
