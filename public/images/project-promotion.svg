<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Employee Promotion Prediction</title>
  <desc id="desc">A dashboard-style project cover for a machine learning prediction model.</desc>
  <defs>
